name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Typecheck and build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      SESSION_SECRET: ci-session-secret-value-at-least-32-characters
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Environment configuration
        run: npm run qa:env

      - name: Access rules
        run: npm run qa:access

      - name: Access audit
        run: npm run qa:access-audit

      - name: Participant action rules
        run: npm run qa:actions

      - name: Reminder link rules
        run: npm run qa:reminders

      - name: Answer dataset rules
        run: npm run qa:dataset

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
